spring:
  application:
    name: ticket-booking-system

  datasource:
    url: jdbc:postgresql://localhost:5432/ticketdb
    username: ticketuser
    password: ticketpass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5

  redisson:
    config: classpath:redisson.yml

app:
  ticket:
    redis-stock-key-prefix: "ticket:stock:"
    lock-key-prefix: "lock:user:booking:"
    lock-wait-time-seconds: 3
    lock-lease-time-seconds: 10

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics